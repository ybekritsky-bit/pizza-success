<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ההזמנה התקבלה | פיצה דימוי</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: #1a1a1a;
      color: #f5f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #242424;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #e8442a, #f4a240);
    }

    .pizza-icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .checkmark {
      width: 56px;
      height: 56px;
      background: #e8442a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pop 0.5s 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .checkmark svg {
      width: 28px;
      height: 28px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #f5f0e8;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 16px;
      color: #a89f94;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid #333;
      margin: 28px 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #a89f94;
      margin-bottom: 10px;
    }

    .info-row span:last-child {
      color: #f5f0e8;
      font-weight: 600;
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 32px;
      background: #25D366;
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      transition: background 0.2s, transform 0.15s;
    }

    .whatsapp-btn:hover {
      background: #1ebe5d;
      transform: translateY(-1px);
    }

    .whatsapp-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }

    .store-info {
      margin-top: 28px;
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }

    .store-info a {
      color: #e8442a;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="pizza-icon">🍕</span>

    <div class="checkmark">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1>התשלום התקבל בהצלחה!</h1>
    <p class="subtitle">תודה שהזמנת אצלנו בפיצה דימוי.<br/>ההזמנה שלך בדרך אליך 🎉</p>

    <hr class="divider" />

    <div class="info-row">
      <span>סטטוס הזמנה</span>
      <span>✅ אושרה</span>
    </div>
    <div class="info-row">
      <span>זמן אספקה משוער</span>
      <span>30–45 דקות</span>
    </div>
    <div class="info-row">
      <span>טלפון לבירורים</span>
      <span><a href="tel:1231234567" style="color:#e8442a; text-decoration:none;">123-123-4567</a></span>
    </div>

    <hr class="divider" />

    <a class="whatsapp-btn" href="https://wa.me/15551943111">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

    <p class="store-info">
      📍 רחוב 123, מודיעין<br/>

    </p>
  </div>
</body>
</html>
